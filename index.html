<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>自販機マップTEST123</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
    margin:0;
}

#map{
    height:100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const map = L.map('map').setView([35.681236,139.767125],13);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19
}
).addTo(map);

async function findVendingMachines(lat, lng) {

    try {

        alert("自販機検索開始");

        const query = `
[out:json];
(
  node["amenity"="vending_machine"](around:10000,${lat},${lng});
);
out;
`;

        const response = await fetch(
            "https://overpass-api.de/api/interpreter",
            {
                method: "POST",
                body: query
            }
        );

        alert("通信成功");

        const data = await response.json();

        alert("自販機数: " + data.elements.length);

        data.elements.forEach(machine => {

            L.marker([machine.lat, machine.lon])
                .addTo(map)
                .bindPopup("🥤 自販機");

        });

    } catch (error) {

        alert("エラー発生");
        alert(error);

    }

}

navigator.geolocation.getCurrentPosition(
(position) => {

    const lat = position.coords.latitude;
    const lng = position.coords.longitude;
    const accuracy = position.coords.accuracy;

    alert(`精度: ${Math.round(accuracy)}m`);

    map.setView([lat, lng], 16);

    findVendingMachines(lat, lng);

    L.marker([lat, lng])
        .addTo(map)
        .bindPopup(`現在地 (±${Math.round(accuracy)}m)`)
        .openPopup();

},
(error) => {
    alert(error.message);
},
{
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0
}
);

</script>

</body>
</html>
